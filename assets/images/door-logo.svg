<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 420" role="img" aria-labelledby="title desc">
  <title id="title">Casa Rei Azul blue doors</title>
  <desc id="desc">Minimal blue line drawing of the ornate double doors at Casa Rei Azul.</desc>
  <g fill="none" stroke="#1e71a5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer door leaves -->
    <path d="M18 18 H78 V402 H18 Z"/>
    <path d="M102 18 H162 V402 H102 Z"/>
    <path d="M90 18 V402"/>

    <!-- top capitals -->
    <path d="M18 38 H78 M102 38 H162"/>
    <path d="M24 54 H72 M108 54 H156"/>

    <!-- upper fluting -->
    <path d="M30 58 V126 M42 58 V126 M54 58 V126 M66 58 V126"/>
    <path d="M114 58 V126 M126 58 V126 M138 58 V126 M150 58 V126"/>

    <!-- mid rails -->
    <path d="M22 136 H74 M106 136 H158"/>
    <path d="M24 148 H72 M108 148 H156"/>

    <!-- gothic motifs -->
    <path d="M34 276 V190 Q34 166 48 152 Q62 166 62 190 V276 Z"/>
    <path d="M118 276 V190 Q118 166 132 152 Q146 166 146 190 V276 Z"/>
    <path d="M34 218 H62 M118 218 H146"/>

    <!-- flower rosettes -->
    <circle cx="48" cy="218" r="7"/>
    <circle cx="132" cy="218" r="7"/>
    <path d="M48 211 V225 M41 218 H55 M43 213 L53 223 M53 213 L43 223"/>
    <path d="M132 211 V225 M125 218 H139 M127 213 L137 223 M137 213 L127 223"/>

    <!-- lower rails and handles -->
    <path d="M22 290 H74 M106 290 H158"/>
    <path d="M30 314 L64 306 M116 306 L150 314"/>
    <circle cx="30" cy="314" r="3"/><circle cx="64" cy="306" r="3"/>
    <circle cx="116" cy="306" r="3"/><circle cx="150" cy="314" r="3"/>

    <!-- lower panels -->
    <rect x="28" y="330" width="42" height="54"/>
    <rect x="110" y="330" width="42" height="54"/>
    <rect x="34" y="336" width="30" height="42"/>
    <rect x="116" y="336" width="30" height="42"/>

    <!-- centre hardware -->
    <path d="M86 194 Q90 188 94 194 V214 Q90 220 86 214 Z"/>
    <circle cx="90" cy="250" r="6"/>
    <circle cx="90" cy="250" r="2"/>

    <!-- feet -->
    <path d="M18 402 H78 M102 402 H162"/>
    <path d="M84 402 H96 L92 392 H88 Z"/>
  </g>
